name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mosh-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
          - os: ubuntu-22.04-arm
            label: linux-arm64
          - os: macos-15-intel
            label: macos-x64
          - os: macos-latest
            label: macos-arm64
          - os: windows-latest
            label: windows-x64
            msys2: UCRT64
          - os: windows-11-arm
            label: windows-arm64
            msys2: CLANGARM64
            msys2-install: >-
              mingw-w64-clang-aarch64-clang
            moss-cc: clang
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: moss/go.mod
          cache: true

      - name: Setup MinGW
        if: matrix.msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msys2 }}
          path-type: inherit
          update: true
          install: >-
            ${{ matrix.msys2-install || 'mingw-w64-ucrt-x86_64-gcc' }}

      - name: Verify ARM64 Windows clang
        if: matrix.moss-cc
        shell: msys2 {0}
        run: clang --version

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare bundled runtime
        if: ${{ !matrix.moss-cc }}
        env:
          MOSS_CC: ${{ matrix.moss-cc || '' }}
        run: npm run desktop:prepare

      - name: Prepare bundled runtime (MSYS2)
        if: ${{ matrix.moss-cc }}
        shell: msys2 {0}
        env:
          MOSS_CC: ${{ matrix.moss-cc }}
          MSYS2_PATH_TYPE: inherit
        run: npm run desktop:prepare

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build:web

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Run Rust check
        working-directory: src-tauri
        run: cargo check
