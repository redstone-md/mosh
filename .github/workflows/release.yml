name: Release

# Build signed-by-default-off installers and attach them to the GitHub release.
# - push a tag `vX.Y.Z`  -> builds and publishes that release
# - manual dispatch       -> builds an existing tag and uploads to its release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and attach binaries to (e.g. v0.2.0)'
        required: true

# tauri-action needs write access to create/update the release and upload assets.
permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & attach installers
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows-only for now. Add macos-latest / ubuntu-22.04 here later.
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # On tag push this resolves to the tag; on dispatch, the requested tag.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Go builds the Moss shared library via `npm run moss:prepare`
      # (invoked by the tauri beforeBuildCommand).
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: moss/go.sum

      # Install the toolchain pinned by rust-toolchain.toml (channel +
      # rustfmt/clippy components) so CI lints match local exactly.
      - name: Install pinned Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      # dist/ must exist before any cargo step (generate_context!).
      - name: Build frontend
        run: npm run build

      # Gate: do not publish artifacts unless the quality bar passes.
      - name: Rustfmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build installers & upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'Mosh ${{ github.event.inputs.tag || github.ref_name }}'
          releaseBody: 'See CHANGELOG.md for release notes.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
