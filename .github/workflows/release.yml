name: Release

on:
  push:
    tags:
      - "v*"
      - "dev-*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mosh-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux-amd64
            rust-target: x86_64-unknown-linux-gnu
            binary: src-tauri/target/x86_64-unknown-linux-gnu/release/mosh
            shared-output: libmoss.so
            shared-header: libmoss.h
            goos: linux
            goarch: amd64
          - os: windows-latest
            label: windows-amd64
            rust-target: x86_64-pc-windows-msvc
            binary: src-tauri/target/x86_64-pc-windows-msvc/release/mosh.exe
            shared-output: moss.dll
            shared-header: moss.h
            goos: windows
            goarch: amd64
          - os: macos-15-intel
            label: macos-amd64
            rust-target: x86_64-apple-darwin
            binary: src-tauri/target/x86_64-apple-darwin/release/mosh
            shared-output: libmoss.dylib
            shared-header: libmoss.h
            goos: darwin
            goarch: amd64
          - os: macos-latest
            label: macos-arm64
            rust-target: aarch64-apple-darwin
            binary: src-tauri/target/aarch64-apple-darwin/release/mosh
            shared-output: libmoss.dylib
            shared-header: libmoss.h
            goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: moss/go.mod
          cache: true

      - name: Setup MinGW
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build shared runtime from submodule
        working-directory: moss
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -buildmode=c-shared -o ../${{ matrix.shared-output }} ./cmd/moss-ffi

      - name: Build Tauri desktop binary
        run: npx tauri build --no-bundle --target ${{ matrix.rust-target }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: mosh-${{ matrix.label }}
          path: |
            ${{ matrix.binary }}
            ${{ matrix.shared-output }}
            ${{ matrix.shared-header }}
            README.md
          if-no-files-found: error
