name: Release

on:
  push:
    tags:
      - 'v*'
      - 'dev-*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mosh-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux-amd64
            rust-target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04-arm
            label: linux-arm64
            rust-target: aarch64-unknown-linux-gnu
          - os: windows-latest
            label: windows-amd64
            rust-target: x86_64-pc-windows-msvc
            msys2: UCRT64
          - os: windows-11-arm
            label: windows-arm64
            rust-target: aarch64-pc-windows-msvc
            msys2: CLANGARM64
            msys2-install: >-
              mingw-w64-clang-aarch64-clang
            moss-cc: clang
          - os: macos-15-intel
            label: macos-amd64
            rust-target: x86_64-apple-darwin
          - os: macos-latest
            label: macos-arm64
            rust-target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: moss/go.mod
          cache: true

      - name: Setup MinGW
        if: matrix.msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msys2 }}
          update: true
          install: >-
            ${{ matrix.msys2-install || 'mingw-w64-ucrt-x86_64-gcc' }}

      - name: Verify ARM64 Windows clang
        if: matrix.moss-cc
        run: clang --version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync submodule to latest MOSS main
        run: npm run moss:sync

      - name: Build and attach shared runtime
        env:
          MOSS_CC: ${{ matrix.moss-cc || '' }}
        run: node ./scripts/build-moss-runtime.mjs --target ${{ matrix.rust-target }}

      - name: Build frontend
        run: npm run build:web

      - name: Build Tauri desktop bundle
        run: npx tauri build --target ${{ matrix.rust-target }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: mosh-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*
            src-tauri/resources/moss/*
            README.md
          if-no-files-found: error
