name: Release

on:
  push:
    tags:
      - 'v*'
      - 'dev-*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mosh-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux-amd64
            rust-target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04-arm
            label: linux-arm64
            rust-target: aarch64-unknown-linux-gnu
          - os: windows-latest
            label: windows-amd64
            rust-target: x86_64-pc-windows-msvc
            msys2: UCRT64
          - os: windows-11-arm
            label: windows-arm64
            rust-target: aarch64-pc-windows-msvc
            msys2: CLANGARM64
            msys2-install: >-
              mingw-w64-clang-aarch64-clang
            moss-cc: clang
            experimental: true
          - os: macos-15-intel
            label: macos-amd64
            rust-target: x86_64-apple-darwin
          - os: macos-latest
            label: macos-arm64
            rust-target: aarch64-apple-darwin
    continue-on-error: ${{ matrix.experimental || false }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: moss/go.mod
          cache: true

      - name: Setup MinGW
        if: matrix.msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msys2 }}
          path-type: inherit
          update: true
          install: >-
            ${{ matrix.msys2-install || 'mingw-w64-ucrt-x86_64-gcc' }}

      - name: Verify ARM64 Windows clang
        if: matrix.moss-cc
        shell: msys2 {0}
        run: |
          which clang
          clang --version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync submodule to latest MOSS main
        run: npm run moss:sync

      - name: Build and attach shared runtime
        if: ${{ !matrix.moss-cc }}
        env:
          MOSS_CC: ${{ matrix.moss-cc || '' }}
        run: node ./scripts/build-moss-runtime.mjs --target ${{ matrix.rust-target }}

      - name: Build and attach shared runtime (MSYS2)
        if: ${{ matrix.moss-cc }}
        shell: msys2 {0}
        env:
          MOSS_CC: ${{ matrix.moss-cc }}
          MSYS2_PATH_TYPE: inherit
        run: node ./scripts/build-moss-runtime.mjs --target ${{ matrix.rust-target }}

      - name: Build frontend
        run: npm run build:web

      - name: Build Tauri desktop bundle
        shell: pwsh
        run: |
          for ($attempt = 1; $attempt -le 2; $attempt++) {
            npx tauri build --target ${{ matrix.rust-target }}
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }
            if ($attempt -eq 2) {
              exit $LASTEXITCODE
            }
            Start-Sleep -Seconds 10
          }

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: mosh-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/rpm/*.rpm
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/msi/*.msi
          if-no-files-found: error
  publish:
    name: Publish GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
