name: Release

# Build installers and attach them to a GitHub release. Manual-only: releases
# are normally built locally (`npm run build:app`) and uploaded with
# `gh release upload`; this workflow stays as a clean-room cloud fallback.
# Run it from the Actions tab and pass the existing tag to build.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and attach binaries to (e.g. v0.2.1)'
        required: true

# tauri-action needs write access to create/update the release and upload assets.
permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & attach installers
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          # Native per-arch macOS builds: each runner compiles its own arch, so
          # there is no cross-compile and moss:prepare's single-arch dylib is
          # correct. (A universal build would need a lipo'd fat dylib instead.)
          - platform: macos-15 # Apple Silicon (arm64)
            args: ''
          # macos-13 was retired (Dec 2025); macos-15-intel is the last Intel
          # image (x86_64), supported until ~Aug 2027. Runner OS does not set
          # the app's minimum macOS — that's the deployment target.
          - platform: macos-15-intel # Intel (x86_64)
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # On tag push this resolves to the tag; on dispatch, the requested tag.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Go builds the Moss shared library via `npm run moss:prepare`
      # (invoked by the tauri beforeBuildCommand).
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: moss/go.sum

      # Install the toolchain pinned by rust-toolchain.toml (channel +
      # rustfmt/clippy components) so CI lints match local exactly.
      - name: Install pinned Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      # dist/ must exist before any cargo step (generate_context!).
      - name: Build frontend
        run: npm run build

      # Build the Moss shared library so the runtime-loading tests can find it.
      - name: Build Moss shared library
        run: npm run moss:prepare

      # Gate: do not publish artifacts unless the quality bar passes.
      - name: Rustfmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      # Process-per-test isolation + retries for flaky loopback handshakes.
      - name: Cargo test (nextest)
        run: cargo nextest run --profile ci --manifest-path src-tauri/Cargo.toml

      # Pull the tag's section out of CHANGELOG.md so the GitHub release shows
      # the actual notes, not a "see CHANGELOG" pointer. Git Bash on the Windows
      # runner provides awk/sed just like the macOS runners.
      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          tag='${{ github.event.inputs.tag || github.ref_name }}'
          version="${tag#v}"
          section="$(awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { p=1; next }
            p && /^## \[/ { exit }
            p { print }
          ' CHANGELOG.md | sed -e '/./,$!d')"
          if [ -z "$section" ]; then
            section="See CHANGELOG.md for release notes."
          fi
          {
            echo 'body<<CHANGELOG_EOF'
            printf '%s\n' "$section"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build installers & upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'Mosh ${{ github.event.inputs.tag || github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
